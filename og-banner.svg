<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020810"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fffce"/>
      <stop offset="100%" style="stop-color:#00c8ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(79,255,206,0.04)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Corner brackets -->
  <g stroke="#4fffce" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 40 40 L 40 80 M 40 40 L 80 40"/>
    <path d="M 1160 40 L 1160 80 M 1160 40 L 1120 40"/>
    <path d="M 40 590 L 40 550 M 40 590 L 80 590"/>
    <path d="M 1160 590 L 1160 550 M 1160 590 L 1120 590"/>
  </g>

  <!-- MK monogram badge -->
  <rect x="80" y="80" width="56" height="56" rx="8" fill="rgba(79,255,206,0.1)" stroke="#4fffce" stroke-width="1.5"/>
  <text x="108" y="118" font-family="monospace" font-size="22" font-weight="900" fill="#4fffce" text-anchor="middle" filter="url(#glow)">MK</text>

  <!-- Eyebrow label -->
  <rect x="80" y="165" width="4" height="18" fill="#4fffce" rx="2"/>
  <text x="94" y="179" font-family="'Courier New', monospace" font-size="13" fill="#4fffce" letter-spacing="4" opacity="0.8">PORTFOLIO · 2026</text>

  <!-- Main name -->
  <text x="80" y="280" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">MADHAVAN</text>
  <text x="80" y="360" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="url(#accent)" filter="url(#glow)" letter-spacing="-2">KARMEGAM</text>

  <!-- Divider line -->
  <rect x="80" y="388" width="480" height="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Role tags -->
  <rect x="80" y="408" width="178" height="32" rx="4" fill="rgba(79,255,206,0.1)" stroke="rgba(79,255,206,0.3)" stroke-width="1"/>
  <text x="169" y="429" font-family="'Courier New', monospace" font-size="13" fill="#4fffce" text-anchor="middle" letter-spacing="1">Business Analyst</text>

  <rect x="270" y="408" width="148" height="32" rx="4" fill="rgba(0,200,255,0.1)" stroke="rgba(0,200,255,0.3)" stroke-width="1"/>
  <text x="344" y="429" font-family="'Courier New', monospace" font-size="13" fill="#00c8ff" text-anchor="middle" letter-spacing="1">UAV Engineer</text>

  <rect x="430" y="408" width="148" height="32" rx="4" fill="rgba(79,255,206,0.08)" stroke="rgba(79,255,206,0.2)" stroke-width="1"/>
  <text x="504" y="429" font-family="'Courier New', monospace" font-size="13" fill="#4fffce" text-anchor="middle" letter-spacing="1">IEEE Researcher</text>

  <!-- Stats on the right -->
  <g opacity="0.9">
    <!-- Stat 1 -->
    <text x="950" y="220" font-family="'Courier New', monospace" font-size="52" font-weight="900" fill="#4fffce" text-anchor="middle" filter="url(#glow)">1+</text>
    <text x="950" y="248" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">YR FINTECH BA</text>

    <!-- Divider -->
    <line x1="870" y1="270" x2="1030" y2="270" stroke="rgba(79,255,206,0.15)" stroke-width="1"/>

    <!-- Stat 2 -->
    <text x="950" y="340" font-family="'Courier New', monospace" font-size="52" font-weight="900" fill="#4fffce" text-anchor="middle" filter="url(#glow)">DGCA</text>
    <text x="950" y="368" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">CERTIFIED PILOT</text>

    <!-- Divider -->
    <line x1="870" y1="390" x2="1030" y2="390" stroke="rgba(79,255,206,0.15)" stroke-width="1"/>

    <!-- Stat 3 -->
    <text x="950" y="458" font-family="'Courier New', monospace" font-size="52" font-weight="900" fill="#4fffce" text-anchor="middle" filter="url(#glow)">TOP5</text>
    <text x="950" y="486" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">HACKATHON FINALIST</text>
  </g>

  <!-- Vertical separator -->
  <line x1="780" y1="160" x2="780" y2="530" stroke="rgba(79,255,206,0.12)" stroke-width="1"/>

  <!-- Bottom URL -->
  <text x="80" y="570" font-family="'Courier New', monospace" font-size="14" fill="rgba(79,255,206,0.5)" letter-spacing="2">madhavankarmegamp.github.io</text>

  <!-- Bottom right label -->
  <text x="1120" y="570" font-family="'Courier New', monospace" font-size="12" fill="rgba(79,255,206,0.3)" text-anchor="middle" letter-spacing="1">Chennai, IN</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)" opacity="0.4"/>
</svg>
